services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: profiling
      MYSQL_USER: profiling_user
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend_profiling
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_KEY: base64:CHANGE_ME_RUN_ARTISAN_KEY_GENERATE==
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: profiling
      DB_USERNAME: profiling_user
      DB_PASSWORD: secret
      FRONTEND_URL: http://localhost:5173
      SESSION_DRIVER: cookie
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend_profiling
      args:
        VITE_API_URL: http://localhost:8000/api
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
