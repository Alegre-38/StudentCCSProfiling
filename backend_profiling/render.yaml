services:
  - type: web
    name: profiling-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_KEY
        sync: false   # run: php artisan key:generate --show
      - key: APP_URL
        sync: false   # e.g. https://profiling-backend.onrender.com
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MYSQL_ATTR_SSL_CA
        value: /etc/ssl/certs/ca-certificates.crt
      - key: FRONTEND_URL
        sync: false   # e.g. https://your-app.vercel.app
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_LEVEL
        value: warning
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: ADMIN_USERNAME
        sync: false   # default: admin
      - key: ADMIN_PASSWORD
        sync: false   # default: Admin@1234 — change this!
