services:
  - type: web
    name: profiling-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_KEY
        sync: false   # run: php artisan key:generate --show
      - key: APP_URL
        sync: false   # e.g. https://profiling-backend.onrender.com
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MYSQL_ATTR_SSL_CA
        value: /etc/ssl/certs/ca-certificates.crt
      - key: FRONTEND_URL
        sync: false   # e.g. https://your-app.vercel.app
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_LEVEL
        value: warning
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: ADMIN_USERNAME
        sync: false   # default: admin
      - key: ADMIN_PASSWORD
        sync: false   # default: Admin@1234 — change this!
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp-relay.brevo.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_USERNAME
        sync: false   # your Brevo login email
      - key: MAIL_PASSWORD
        sync: false   # your Brevo SMTP key (not login password)
      - key: MAIL_FROM_ADDRESS
        sync: false   # your verified sender email in Brevo
      - key: MAIL_FROM_NAME
        value: Profiling System
